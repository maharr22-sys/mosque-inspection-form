<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosque Inspection Form | Maha</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --G:#1a6b3a;--GD:#124d2a;--GL:#2d8a4e;
  --Au:#c9a84c;--AL:#e8c97a;
  --bg:#f8f9f6;--tx:#1a2e1a;--bd:#d0ddd0;--sb:#f0f5f1
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:#e8ede9;color:var(--tx);direction:rtl}
.w{max-width:940px;margin:0 auto;padding:20px 14px 70px}

.ahdr{background:linear-gradient(135deg,#0f3d20,#1a6b3a 55%,#2d8a4e);
  border-radius:14px;padding:28px 36px;text-align:center;margin-bottom:22px;
  position:relative;overflow:hidden;box-shadow:0 8px 30px rgba(26,107,58,.35)}
.ahdr::before{content:'';position:absolute;inset:0;opacity:.05;
  background-image:url("data:image/svg+xml,%3Csvg width='52' height='52' viewBox='0 0 52 52' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M26 0l5 22H52l-17 13 6 22-21-15-21 15 6-22L-8 22h21z' fill='%23fff'/%3E%3C/svg%3E")}
.ahdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#c9a84c,#e8c97a,#c9a84c,transparent)}
.lgo{width:74px;height:74px;background:rgba(255,255,255,.13);border-radius:50%;
  margin:0 auto 13px;display:flex;align-items:center;justify-content:center;
  border:2px solid rgba(201,168,76,.5);font-size:30px}
.ahdr h1{font-size:17px;font-weight:800;color:#fff;margin-bottom:3px;text-shadow:0 1px 3px rgba(0,0,0,.2)}
.ahdr p{font-size:12px;color:rgba(255,255,255,.82);font-family:'Tajawal',sans-serif;margin-bottom:1px}

.crd{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;
  box-shadow:0 2px 10px rgba(26,107,58,.07);border:1px solid rgba(201,168,76,.13)}
.stl{font-size:14px;font-weight:700;color:var(--GD);border-bottom:2px solid var(--Au);
  padding-bottom:8px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.stl .ic{width:28px;height:28px;background:var(--G);color:#fff;border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

.row{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.row.f{grid-template-columns:1fr}.row.t{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:5px}
label{font-size:12px;font-weight:600;color:var(--GD);font-family:'Tajawal',sans-serif}
input[type=text],input[type=date],input[type=number],textarea,select{
  border:1.5px solid var(--bd);border-radius:7px;padding:9px 12px;
  font-family:'Cairo',sans-serif;font-size:13px;color:var(--tx);
  background:var(--bg);transition:border-color .2s,box-shadow .2s;direction:rtl;width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--G);
  box-shadow:0 0 0 3px rgba(26,107,58,.09);background:#fff}
textarea{resize:vertical;min-height:72px}

.isec{background:var(--sb);border:1px solid rgba(26,107,58,.1);
  border-radius:9px;padding:16px;margin-bottom:12px}
.isec h3{font-size:13px;font-weight:700;color:var(--GD);
  margin-bottom:11px;display:flex;align-items:center;gap:7px}
.isec h3::before{content:'';display:block;width:3px;height:15px;background:var(--Au);border-radius:2px}

.stw{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.sb{padding:5px 12px;border-radius:18px;border:1.5px solid var(--bd);
  background:#fff;font-family:'Cairo',sans-serif;font-size:11px;cursor:pointer;transition:all .18s}
.sb.good{background:#e8f5e9;border-color:#4caf50;color:#2e7d32;font-weight:700}
.sb.fair{background:#fff8e1;border-color:#ffc107;color:#e65100;font-weight:700}
.sb.bad{background:#ffebee;border-color:#f44336;color:#c62828;font-weight:700}

.ua{border:2px dashed var(--GL);border-radius:9px;padding:18px;text-align:center;
  background:rgba(26,107,58,.03);cursor:pointer;transition:all .2s;margin-top:9px}
.ua:hover{border-color:var(--Au);background:rgba(201,168,76,.05)}
.ua p{font-size:12px;color:#777;margin-top:6px}
.uic{font-size:26px}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:8px;margin-top:11px}
.pi{position:relative;border-radius:7px;overflow:hidden;border:2px solid var(--bd);aspect-ratio:4/3}
.pi img{width:100%;height:100%;object-fit:cover}
.rb{position:absolute;top:3px;left:3px;background:rgba(200,0,0,.82);color:#fff;
  border:none;border-radius:50%;width:19px;height:19px;font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}

.crow{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.cwrp{width:140px;height:140px;flex-shrink:0}
.slrs{flex:1;min-width:170px}
.slr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.slr label{font-size:11px;width:110px;flex-shrink:0}
.slr input[type=range]{flex:1;accent-color:var(--G)}
.slr span{font-size:12px;font-weight:700;color:var(--GD);width:35px}

.gbtn{width:100%;padding:15px;background:linear-gradient(135deg,var(--GD),var(--G));
  color:#fff;border:none;border-radius:10px;font-family:'Cairo',sans-serif;
  font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;
  box-shadow:0 4px 16px rgba(26,107,58,.35);margin-top:18px;position:relative;overflow:hidden}
.gbtn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--Au),transparent)}
.gbtn:hover:not(:disabled){background:linear-gradient(135deg,var(--G),var(--GL));
  transform:translateY(-2px);box-shadow:0 7px 22px rgba(26,107,58,.4)}
.gbtn:disabled{opacity:.6;cursor:not-allowed}
.pb{height:6px;background:#e0e0e0;border-radius:3px;margin-top:9px;overflow:hidden;display:none}
.pb.on{display:block}
.pf{height:100%;background:linear-gradient(90deg,var(--G),var(--Au));border-radius:3px;transition:width .3s;width:0%}
.sm{text-align:center;font-size:12px;color:var(--GD);margin-top:6px;font-weight:600;display:none}
.sm.on{display:block}
@media(max-width:600px){.row,.row.t{grid-template-columns:1fr}.ahdr{padding:16px}.crd{padding:14px}}
</style>
</head>

  <h1>وزارة الشؤون الإسلامية والدعوة والإرشاد</h1>
  <p>فرع الوزارة بمنطقة الرياض</p>
  <p>إدارة المشاريع والصيانة — قسم المشاريع</p>
  <p style="margin-top:6px;font-size:11px;opacity:.6">نموذج المعاينة الظاهرية للمساجد</p>
</div>

<div class="crd">
  <div class="stl"><span class="ic">📋</span>البيانات الأساسية للتقرير</div>
  <div class="row">
    <div class="fg"><label>اسم المسجد</label><input type="text" id="fn" placeholder="أدخل اسم المسجد الكريم"></div>
    <div class="fg"><label>رقم المعاملة</label><input type="text" id="ftn" placeholder="مثال: ١٤٤٦/م/٠٠١"></div>
  </div>
  <div class="row">
    <div class="fg"><label>أساس المعاملة</label><input type="text" id="ftb" placeholder="مثال: خطاب إدارة المشاريع رقم ..."></div>
    <div class="fg"><label>تاريخ التقرير</label><input type="date" id="fdt"></div>
  </div>
  <div class="row f">
    <div class="fg"><label>الغرض من التقرير</label>
      <textarea id="fpu" rows="2" placeholder="مثال: معاينة المسجد لتقييم الحالة الإنشائية والتشغيلية وإعداد توصيات الصيانة اللازمة"></textarea>
    </div>
  </div>
  <div class="row t">
    <div class="fg"><label>العمر التقريبي (سنة)</label><input type="number" id="fag" placeholder="مثال: 15"></div>
    <div class="fg"><label>إحداثيات الموقع</label><input type="text" id="fco" placeholder="24.71° N, 46.67° E"></div>
    <div class="fg"><label>الحي / المنطقة</label><input type="text" id="fdi" placeholder="مثال: حي الملز - الرياض"></div>
  </div>
  <div class="row f">
    <div class="fg"><label>الحالة العامة للمسجد</label>
      <div class="stw" id="sg">
        <button class="sb" onclick="setSt('sg',this,'جيدة','good')">✅ جيدة</button>
        <button class="sb" onclick="setSt('sg',this,'متوسطة','fair')">⚠️ متوسطة</button>
        <button class="sb" onclick="setSt('sg',this,'تحتاج صيانة عاجلة','bad')">🔴 تحتاج صيانة عاجلة</button>
      </div>
    </div>
  </div>
  <div class="fg" style="margin-top:9px">
    <label>صورة الموقع (رئيسية)</label>
    <div class="ua" onclick="document.getElementById('is').click()">
      <div class="uic">🏛️</div>
      <p>اضغط لرفع صورة الموقع</p>
      <input type="file" id="is" accept="image/*" style="display:none" onchange="loadSite(this)">
    </div>
    <div id="ps" class="pg"></div>
  </div>
</div>

<div class="crd">
  <div class="stl"><span class="ic">🔍</span>تفاصيل المعاينة الميدانية</div>
  <div id="secs"></div>
</div>

<div class="crd">
  <div class="stl"><span class="ic">📊</span>نسبة الإنجاز والتوصيات</div>
  <div class="row f">
    <div class="fg">
      <label>مؤشرات نسبة الإنجاز</label>
      <div class="crow">
        <div class="slrs">
          <div class="slr"><label>الأعمال المنجزة</label>
            <input type="range" id="sd" min="0" max="100" value="0" oninput="uc()">
            <span id="vd">0%</span></div>
          <div class="slr"><label>قيد التنفيذ</label>
            <input type="range" id="sp" min="0" max="100" value="0" oninput="uc()">
            <span id="vp">0%</span></div>
          <div class="slr"><label>الأعمال المتبقية</label>
            <input type="range" id="sr" min="0" max="100" value="100" oninput="uc()">
            <span id="vr">100%</span></div>
        </div>
        <div class="cwrp"><canvas id="mc"></canvas></div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="fg"><label>المدة الزمنية المقترحة</label><input type="text" id="fdu" placeholder="مثال: ٣ أشهر من تاريخ الترسية"></div>
    <div class="fg"><label>اسم معد التقرير</label><input type="text" id="fpr" value="Maha" placeholder="الاسم والمسمى الوظيفي"></div>
  </div>
  <div class="row">
    <div class="fg"><label>رئيس قسم المشاريع</label><input type="text" id="fhd" placeholder="الاسم والمسمى الوظيفي"></div>
    <div class="fg"><label>التوجيه</label><input type="text" id="fdr" placeholder="توجيه المسؤول المختص"></div>
  </div>
  <div class="row f">
    <div class="fg"><label>التوصيات والمرئيات</label>
      <textarea id="frc" rows="4" placeholder="أدخل التوصيات والمرئيات التفصيلية بناءً على نتائج المعاينة..."></textarea>
    </div>
  </div>
</div>

// BUILD UI SECTIONS

(function buildSecs(){
  const c=document.getElementById('secs');
  SECS.forEach(s=>{
    const d=document.createElement('div');
    d.className='isec';
    d.innerHTML=`
      <h3>${s.title}</h3>
      <div class="row f"><div class="fg">
        <label>الوصف التفصيلي والملاحظات</label>
        <textarea id="nt-${s.id}" rows="3" placeholder="أدخل الوصف والملاحظات..."></textarea>
      </div></div>
      <div class="row">
        <div class="fg"><label>حالة هذا القسم</label>
          <div class="stw" id="st-${s.id}">
            <button class="sb" onclick="setSt('st-${s.id}',this,'جيدة','good')">✅ جيدة</button>
            <button class="sb" onclick="setSt('st-${s.id}',this,'متوسطة','fair')">⚠️ متوسطة</button>
            <button class="sb" onclick="setSt('st-${s.id}',this,'تحتاج صيانة','bad')">🔴 تحتاج صيانة</button>
          </div>
        </div>
        <div class="fg"><label>الفقرة / رقم البند</label>
          <input type="text" id="pa-${s.id}" placeholder="مثال: أولاً / ١">
        </div>
      </div>
      <div class="fg"><label>صور هذا القسم</label>
        <div class="ua" onclick="document.getElementById('ii-${s.id}').click()">
          <div class="uic">📸</div>
          <p>اضغط لرفع الصور — يمكن رفع عدة صور معاً</p>
          <input type="file" id="ii-${s.id}" accept="image/*" multiple style="display:none"
            onchange="addImgs(this,'${s.id}')">

      </div>`;
    c.appendChild(d);
  });
})();

// ═══════════════════════════════════════════════════
// STATUS
// ═══════════════════════════════════════════════════
function setSt(wid,btn,val,cls){
  document.getElementById(wid).querySelectorAll('.sb').forEach(b=>b.className='sb');
  btn.className='sb '+cls;
  document.getElementById(wid).dataset.v=val;
}

// ═══════════════════════════════════════════════════
// IMAGES
// ═══════════════════════════════════════════════════
function addImgs(inp,sid){
  Array.from(inp.files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{imgs[sid].push(e.target.result);renderPrev(sid);};
    r.readAsDataURL(f);
  });
  inp.value='';
}
function loadSite(inp){
  if(!inp.files[0])return;
  const r=new FileReader();
  r.onload=e=>{
    siteImg=e.target.result;
    document.getElementById('ps').innerHTML=`
      <div class="pi"><img src="${siteImg}">
      <button class="rb" onclick="siteImg=null;document.getElementById('ps').innerHTML=''">✕</button></div>`;
  };
  r.readAsDataURL(inp.files[0]);
  inp.value='';
}
function renderPrev(sid){
  document.getElementById('ip-'+sid).innerHTML=
    imgs[sid].map((u,i)=>`<div class="pi"><img src="${u}">
      <button class="rb" onclick="delImg('${sid}',${i})">✕</button></div>`).join('');
}
function delImg(sid,i){imgs[sid].splice(i,1);renderPrev(sid);}

// ═══════════════════════════════════════════════════
// CHART
// ═══════════════════════════════════════════════════
let MC;
(function(){
  MC=new Chart(document.getElementById('mc').getContext('2d'),{
    type:'doughnut',
    data:{labels:['منجز','قيد التنفيذ','متبقي'],
      datasets:[{data:[0,0,100],backgroundColor:['#1a6b3a','#c9a84c','#e0e0e0'],borderWidth:0}]},
    options:{cutout:'65%',plugins:{legend:{display:false}},animation:{animateRotate:true}}
  });
})();
function uc(){
  const d=+document.getElementById('sd').value,
        p=+document.getElementById('sp').value,
        r=+document.getElementById('sr').value;
  document.getElementById('vd').textContent=d+'%';
  document.getElementById('vp').textContent=p+'%';
  document.getElementById('vr').textContent=r+'%';
  MC.data.datasets[0].data=[d,p,r];MC.update();
}

// ═══════════════════════════════════════════════════
// COLLECT
// ═══════════════════════════════════════════════════
const gv=id=>(document.getElementById(id)||{}).value||'';
const gsv=id=>(document.getElementById(id)||{}).dataset?.v||'';
function fmtDate(d){
  if(!d)return'';
  try{return new Date(d).toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'});}
  catch(e){return d;}
}
function collect(){
  return{
    name:gv('fn'),tnum:gv('ftn'),tbasis:gv('ftb'),date:fmtDate(gv('fdt')),
    purpose:gv('fpu'),age:gv('fag'),coords:gv('fco'),district:gv('fdi'),
    genSt:gsv('sg'),siteImg,
    secs:SECS.map(s=>({id:s.id,title:s.title,
      para:gv('pa-'+s.id),notes:gv('nt-'+s.id),
      status:gsv('st-'+s.id),imgs:[...imgs[s.id]]})),
    done:gv('sd'),prog:gv('sp'),rem:gv('sr'),
    dur:gv('fdu'),prep:gv('fpr'),head:gv('fhd'),dir:gv('fdr'),recs:gv('frc'),
  };
}

// ═══════════════════════════════════════════════════
// PDF GENERATION — pure jsPDF drawing (no html2canvas)
// ═══════════════════════════════════════════════════
const sl=ms=>new Promise(r=>setTimeout(r,ms));
const PW=210,PH=297,ML=14,MR=14,CW=210-14-14;

async function startGen(){
  const btn=document.getElementById('gb'),
        pb=document.getElementById('pb'),
        pf=document.getElementById('pf'),
        sm=document.getElementById('sm');
  btn.disabled=true;pb.classList.add('on');sm.classList.add('on');
  const sp=(pct,txt)=>{pf.style.width=pct+'%';sm.textContent=txt;};
  try{
    sp(8,'جارٍ تجميع البيانات...');await sl(200);
    const data=collect();
    sp(20,'جارٍ إنشاء مستند PDF...');await sl(150);
    await makePDF(data,sp);
    sp(100,'✅ تم إنشاء التقرير بنجاح!');await sl(1500);
  }catch(e){
    console.error(e);
    sm.textContent='❌ خطأ: '+e.message;
  }finally{
    btn.disabled=false;
    setTimeout(()=>{pb.classList.remove('on');sm.classList.remove('on');pf.style.width='0%';},2500);
  }
}

async function makePDF(D,sp){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  let pn=0;

  function newPage(first=false){
    if(!first)doc.addPage();
    pn++;
    drawBg(doc,pn,D);
  }

  // PAGE 1 — COVER
  newPage(true);
  sp(30,'الصفحة الافتتاحية...');await sl(40);
  drawCover(doc,D);

  // SECTION PAGES
  const active=D.secs.filter(s=>s.notes||s.status||s.imgs.length>0);
  for(let i=0;i<active.length;i++){
    const s=active[i];
    sp(30+Math.round((i/(active.length+1))*55),`معالجة: ${s.title}...`);
    await sl(25);
    newPage();
    let y=drawSection(doc,s,D);
    if(s.imgs.length>0){
      y=await drawImgs(doc,s.imgs,y,D,()=>{newPage();return 44;});
    }
  }

  // CLOSING PAGE
  sp(88,'الصفحة الختامية...');await sl(40);
  newPage();
  drawClosing(doc,D,pn);

  sp(97,'جارٍ حفظ الملف...');await sl(80);
  const fn=`تقرير-معاينة-${(D.name||'مسجد').replace(/\s+/g,'-')}.pdf`;
  doc.save(fn);
}

// ─── BACKGROUND (header + footer + corners) ──────────────────────────
function drawBg(doc,pn,D){
  // Header
  doc.setFillColor(12,50,26);doc.rect(0,0,PW,14,'F');
  doc.setFillColor(26,107,58);doc.rect(0,14,PW,12,'F');
  doc.setFillColor(45,138,78);doc.rect(PW*.55,0,PW*.45,26,'F');
  doc.setFillColor(26,107,58);doc.rect(PW*.3,0,PW*.25,26,'F');
  // Gold line
  doc.setFillColor(201,168,76);doc.rect(0,25.5,PW,.8,'F');
  // Header text
  doc.setTextColor(255,255,255);
  doc.setFontSize(9.5);doc.setFont('helvetica','bold');
  rt(doc,'وزارة الشؤون الإسلامية والدعوة والإرشاد',PW/2,10,'center');
  doc.setFontSize(7.5);doc.setFont('helvetica','normal');
  rt(doc,'فرع الوزارة بمنطقة الرياض',PW/2,17,'center');
  rt(doc,'إدارة المشاريع والصيانة — قسم المشاريع',PW/2,23,'center');
  // Ministry Logo in header
  try{
    doc.addImage(LOGO_B64,'JPEG',PW/2-9,2,18,18);
  }catch(e){
    doc.setDrawColor(201,168,76);doc.setLineWidth(.5);doc.circle(PW/2,13,10,'S');
  }

  // Footer
  doc.setFillColor(12,50,26);doc.rect(0,PH-10,PW,10,'F');
  doc.setFillColor(201,168,76);doc.rect(0,PH-10.5,PW,.5,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','normal');
  rt(doc,`تقرير المعاينة الظاهرية — ${D.name||''}`,ML,PH-4.5);
  rt(doc,`صفحة ${pn}`,PW/2,PH-4.5,'center');
  rt(doc,D.date||'',PW-MR,PH-4.5,'right');

  // Corner gold accents
  doc.setFillColor(201,168,76);
  doc.rect(ML,30,7,.35,'F');doc.rect(ML,.0,.35,7,'F');
  doc.rect(PW-MR-7,30,7,.35,'F');doc.rect(PW-MR,.0,.35,7,'F');
  doc.rect(ML,PH-14,7,.35,'F');doc.rect(ML,PH-17,.35,4,'F');
  doc.rect(PW-MR-7,PH-14,7,.35,'F');doc.rect(PW-MR,PH-17,.35,4,'F');

  doc.setTextColor(26,46,26);
}

// ─── rt: right-aligned text helper ───────────────────────────────────
function rt(doc,txt,x,y,align='right'){
  doc.text(txt,x,y,{align,isInputRtl:true,isOutputRtl:true});
}

// ─── COVER PAGE ───────────────────────────────────────────────────────
function drawCover(doc,D){
  let y=32;
  // Title box
  doc.setFillColor(240,246,240);doc.setDrawColor(26,107,58);doc.setLineWidth(.6);
  doc.roundedRect(ML,y,CW,20,2,2,'FD');
  doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(18,77,42);
  rt(doc,'تقرير فني بالمعاينة الظاهرية',PW/2,y+8,'center');
  doc.setFontSize(9.5);rt(doc,D.name||'مسجد',PW/2,y+16,'center');
  y+=24;

  // Info rows
  const rows=[
    ['اسم المسجد',D.name,'رقم المعاملة',D.tnum],
    ['أساس المعاملة',D.tbasis,null,null],
    ['تاريخ التقرير',D.date,'المنطقة / الحي',D.district],
    ['الإحداثيات',D.coords,'العمر التقريبي',(D.age||'')+(D.age?' سنة':'')],
    ['الحالة العامة',D.genSt,null,null],
    ['الغرض من التقرير',D.purpose,null,null],
  ];
  rows.forEach(r=>{y=irow(doc,r,y);});
  y+=5;

  // Site image
  if(D.siteImg){
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(18,77,42);
    rt(doc,'صورة الموقع',PW/2,y+3,'center');y+=5;
    try{
      const mh=Math.min(60,PH-y-16),mw=CW;
      const {w,h}=fitImg(D.siteImg,mw,mh);
      const ix=ML+(CW-w)/2;
      doc.setDrawColor(190,190,190);doc.setLineWidth(.3);
      doc.rect(ix-.5,y-.5,w+1,h+1,'S');
      doc.addImage(D.siteImg,'JPEG',ix,y,w,h);
      y+=h+5;
    }catch(e){console.warn(e);}
  }
}

// ─── SECTION PAGE ─────────────────────────────────────────────────────
function drawSection(doc,sec,D){
  let y=30;
  // Section bar
  doc.setFillColor(26,107,58);doc.rect(ML,y,CW,8,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(9.5);doc.setFont('helvetica','bold');
  rt(doc,sec.title,PW-MR-2,y+5.5,'right');
  y+=10;

  // Table header
  const cw=[20,110,26];
  doc.setFillColor(232,240,232);doc.rect(ML,y,CW,7,'F');
  doc.setDrawColor(190,205,190);doc.setLineWidth(.25);doc.rect(ML,y,CW,7,'S');
  doc.setFontSize(8.5);doc.setFont('helvetica','bold');doc.setTextColor(18,77,42);
  let cx=ML;
  ['الفقرة','البيان والملاحظات','الحالة'].forEach((h,i)=>{
    rt(doc,h,cx+cw[i]-1.5,y+5,'right');
    if(i<2){doc.setDrawColor(190,205,190);doc.line(cx+cw[i],y,cx+cw[i],y+7);}
    cx+=cw[i];
  });
  y+=7;

  // Table body
  const nl=doc.splitTextToSize(sec.notes||'لا توجد ملاحظات',106);
  const rh=Math.max(9,nl.length*4.8+3.5);
  doc.setFillColor(250,253,250);doc.setDrawColor(205,215,205);doc.setLineWidth(.25);
  doc.rect(ML,y,CW,rh,'FD');
  doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(26,46,26);
  rt(doc,sec.para||'—',ML+cw[0]-1.5,y+rh/2+1.5,'right');
  doc.line(ML+cw[0],y,ML+cw[0],y+rh);
  nl.forEach((l,li)=>rt(doc,l,ML+cw[0]+cw[1]-1.5,y+4.5+li*4.8,'right'));
  doc.line(ML+cw[0]+cw[1],y,ML+cw[0]+cw[1],y+rh);
  const sc=sec.status==='جيدة'?[36,115,46]:sec.status==='متوسطة'?[190,95,0]:[185,35,35];
  doc.setFont('helvetica','bold');doc.setTextColor(...sc);
  rt(doc,sec.status||'—',PW-MR-1.5,y+rh/2+1.5,'right');
  y+=rh+5;
  return y;
}

// ─── IMAGES ───────────────────────────────────────────────────────────
async function drawImgs(doc,list,y,D,newPageFn){
  if(!list||!list.length)return y;
  doc.setFillColor(247,250,247);doc.setDrawColor(205,215,205);doc.setLineWidth(.25);
  doc.rect(ML,y,CW,6,'FD');
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(18,77,42);
  rt(doc,'الصور الميدانية',PW-MR-2,y+4.2,'right');
  y+=7;

  const COLS=3,GAP=3;
  const iw=(CW-GAP*(COLS-1))/COLS;
  const ih=iw*.72;

  for(let i=0;i<list.length;i++){
    const col=i%COLS;
    const x=ML+col*(iw+GAP);
    if(y+ih+3>PH-14){y=newPageFn();}
    try{
      doc.setDrawColor(190,190,190);doc.setLineWidth(.3);
      doc.rect(x,y,iw,ih,'S');
      doc.addImage(list[i],'JPEG',x,y,iw,ih);
    }catch(e){
      doc.setFillColor(235,235,235);doc.rect(x,y,iw,ih,'F');
      doc.setFontSize(7);doc.setTextColor(150,150,150);
      rt(doc,'صورة',x+iw/2,y+ih/2,'center');
    }
    if(col===COLS-1||i===list.length-1)y+=ih+GAP;
  }
  return y+3;
}

// ─── CLOSING PAGE ─────────────────────────────────────────────────────
function drawClosing(doc,D,pn){
  let y=30;
  // Header bar
  doc.setFillColor(26,107,58);doc.rect(ML,y,CW,8,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(9.5);doc.setFont('helvetica','bold');
  rt(doc,'ملخص التقرير والتوصيات',PW-MR-2,y+5.5,'right');
  y+=11;

  // Two-column layout: table left, chart right
  const TW=85,CH_X=ML+TW+8,CH_Y=y+18,CR=20;

  doc.setFontSize(8.5);doc.setFont('helvetica','bold');doc.setTextColor(18,77,42);
  rt(doc,'مؤشرات نسبة الإنجاز',ML+TW,y,'right');
  y+=4;
  // Table header row
  doc.setFillColor(26,107,58);doc.rect(ML,y,TW,6.5,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(7.5);
  rt(doc,'البند',ML+TW-2,y+4.5,'right');
  rt(doc,'النسبة',ML+20,y+4.5,'right');
  y+=6.5;

  const tr=[
    ['الأعمال المنجزة',D.done+'%',[26,107,58]],
    ['قيد التنفيذ',D.prog+'%',[190,138,0]],
    ['الأعمال المتبقية',D.rem+'%',[130,130,130]],
    ['المدة المقترحة',D.dur||'—',[26,46,26]],
  ];
  tr.forEach(([lbl,val,col],ri)=>{
    doc.setFillColor(ri%2===0?255:249,ri%2===0?253:251,ri%2===0?255:249);
    doc.rect(ML,y,TW,6.5,'F');
    doc.setDrawColor(200,210,200);doc.setLineWidth(.22);doc.rect(ML,y,TW,6.5,'S');
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(26,46,26);
    rt(doc,lbl,ML+TW-2,y+4.5,'right');
    doc.setFont('helvetica','bold');doc.setTextColor(...col);
    rt(doc,val,ML+20,y+4.5,'right');
    y+=6.5;
  });

  // PIE CHART (manual)
  drawPie(doc,CH_X+CR,CH_Y,CR,[
    {v:+D.done,c:[26,107,58]},{v:+D.prog,c:[201,168,76]},{v:+D.rem,c:[215,215,215]}
  ]);
  // Legend
  const leg=[{t:'منجز',c:[26,107,58]},{t:'قيد التنفيذ',c:[201,168,76]},{t:'متبقي',c:[185,185,185]}];
  leg.forEach((l,i)=>{
    doc.setFillColor(...l.c);doc.rect(CH_X,CH_Y+CR+4+i*5.5,3.5,3.5,'F');
    doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(26,46,26);
    rt(doc,l.t,CH_X+18,CH_Y+CR+7+i*5.5);
  });

  y+=8;

  // Recommendations
  doc.setFillColor(26,107,58);doc.rect(ML,y,CW,8,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');
  rt(doc,'التوصيات والمرئيات',PW-MR-2,y+5.5,'right');
  y+=9;
  const rl=doc.splitTextToSize(D.recs||'لا توجد توصيات مضافة',CW-5);
  const rh2=Math.max(16,rl.length*4.8+5);
  doc.setFillColor(250,253,250);doc.setDrawColor(205,215,205);doc.setLineWidth(.25);
  doc.rect(ML,y,CW,rh2,'FD');
  doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(26,46,26);
  rl.forEach((l,i)=>rt(doc,l,PW-MR-2,y+4.5+i*4.8,'right'));
  y+=rh2+8;

  // Signature boxes
  const sw=(CW-6)/3;
  const sigs=[
    ['معد التقرير',D.prep||''],
    ['رئيس قسم المشاريع',D.head||''],
    ['التوجيه',D.dir||''],
  ];
  sigs.forEach(([t,n],i)=>{
    const sx=ML+i*(sw+3);
    doc.setFillColor(250,252,250);doc.setDrawColor(195,210,195);doc.setLineWidth(.35);
    doc.roundedRect(sx,y,sw,28,2,2,'FD');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(18,77,42);
    rt(doc,t,sx+sw-2,y+6,'right');
    if(n){doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(80,80,80);
      rt(doc,n,sx+sw-2,y+11,'right');}
    doc.setDrawColor(175,175,175);doc.setLineWidth(.25);
    doc.setLineDash([1,1]);doc.line(sx+3,y+23,sx+sw-3,y+23);doc.setLineDash([]);
    doc.setFontSize(7);doc.setTextColor(150,150,150);
    rt(doc,'التوقيع',sx+sw/2,y+27,'center');
  });
}

// ─── PIE CHART (manual triangles) ────────────────────────────────────
function drawPie(doc,cx,cy,r,segs){
  const tot=segs.reduce((a,b)=>a+b.v,0)||100;
  let a=-Math.PI/2;
  segs.forEach(s=>{
    if(s.v<=0)return;
    const sw=(s.v/tot)*Math.PI*2;
    const steps=Math.max(4,Math.round(sw*20));
    doc.setFillColor(...s.c);
    for(let i=0;i<steps;i++){
      const a1=a+(i/steps)*sw,a2=a+((i+1)/steps)*sw;
      doc.triangle(cx,cy,cx+r*Math.cos(a1),cy+r*Math.sin(a1),cx+r*Math.cos(a2),cy+r*Math.sin(a2),'F');
    }
    a+=sw;
  });
  doc.setFillColor(255,255,255);doc.circle(cx,cy,r*.48,'F');
  doc.setDrawColor(190,190,190);doc.setLineWidth(.25);doc.circle(cx,cy,r,'S');
}

// ─── FIT IMAGE ────────────────────────────────────────────────────────
function fitImg(dataUrl,maxW,maxH){
  return{w:maxW,h:Math.min(maxH,maxW*.65)};
}
